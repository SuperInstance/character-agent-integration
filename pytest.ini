[pytest]
# Pytest configuration for character-agent-integration

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=character_agent_integration
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80

# Coverage configuration
[coverage:run]
source = character_agent_integration
omit =
    tests/*
    */__init__.py
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow-running tests
    memory: Tests requiring memory systems
    emotion: Tests for emotional intelligence
    personality: Tests for personality systems
    roles: Tests for agent roles
